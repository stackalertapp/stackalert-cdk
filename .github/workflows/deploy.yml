name: CDK Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [prod, staging, dev]
        default: prod

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}
  ARTIFACT_S3_BUCKET: ${{ vars.ARTIFACT_S3_BUCKET }}
  ARTIFACT_S3_KEY: ${{ vars.ARTIFACT_S3_KEY || 'stackalert-lambda/latest.zip' }}
  NOTIFICATION_CHANNELS: ${{ vars.NOTIFICATION_CHANNELS || 'slack' }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  PAGERDUTY_ROUTING_KEY: ${{ secrets.PAGERDUTY_ROUTING_KEY }}
  CROSS_ACCOUNT_ROLE_ARN: ${{ vars.CROSS_ACCOUNT_ROLE_ARN }}
  SPIKE_THRESHOLD_PCT: ${{ vars.SPIKE_THRESHOLD_PCT || '50' }}
  CREATE_DEPLOY_ROLE: ${{ vars.CREATE_DEPLOY_ROLE || 'false' }}
  GITHUB_ORG: ${{ vars.GITHUB_ORG || github.repository_owner }}
  GITHUB_REPO: ${{ vars.GITHUB_REPO || github.event.repository.name }}

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: CDK Synth (dry run)
        run: npm run synth -- --context environment=${{ env.ENVIRONMENT }}
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
          # Placeholder fallbacks for synth-only step — no real AWS calls happen during synth.
          # The real values are used at deploy time via repo vars/secrets.
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID || '123456789012' }}
          ARTIFACT_S3_BUCKET: ${{ vars.ARTIFACT_S3_BUCKET || 'placeholder-bucket' }}

  deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: CDK Deploy
        run: npm run deploy -- --context environment=${{ env.ENVIRONMENT }}

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Invoke Lambda (spike mode)
        run: |
          FUNCTION_NAME="stackalert-${{ env.ENVIRONMENT }}"
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --payload '{"mode":"spike"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/response.json

          cat /tmp/response.json
          if jq -e '.errorMessage' /tmp/response.json > /dev/null 2>&1; then
            echo "Lambda invocation failed!"
            exit 1
          fi
          echo "Smoke test passed ✅"
